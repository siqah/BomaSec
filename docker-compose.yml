##############################################################################
# BomaSec — SOC-in-a-Box  |  Local Development Environment
# ─────────────────────────────────────────────────────────────────────────
# Usage:
#   docker compose up -d          # Start everything
#   docker compose logs -f api    # Tail FastAPI logs
#   docker compose down -v        # Tear down + remove volumes
##############################################################################

services:

  # ──────────────────────────────────────────────────────────────────────────
  # Redpanda — Kafka-compatible streaming broker (single binary, no ZK)
  # ──────────────────────────────────────────────────────────────────────────
  redpanda:
    image: redpandadata/redpanda:latest
    container_name: bomasec-redpanda
    command:
      - redpanda
      - start
      - --mode dev-container
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
    ports:
      - "19092:19092"   # Kafka API (external)
      - "18082:18082"   # HTTP Proxy
      - "18081:18081"   # Schema Registry
      - "9644:9644"     # Admin API
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    networks:
      - bomasec-net
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy'  || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ──────────────────────────────────────────────────────────────────────────
  # Redpanda Console — lightweight UI for topic inspection
  # ──────────────────────────────────────────────────────────────────────────
  redpanda-console:
    image: redpandadata/console:latest
    container_name: bomasec-redpanda-console
    ports:
      - "8080:8080"
    environment:
      CONFIG_FILEPATH: ""
      KAFKA_BROKERS: redpanda:9092
      KAFKA_SCHEMAREGISTRY_ENABLED: "true"
      KAFKA_SCHEMAREGISTRY_URLS: http://redpanda:8081
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - bomasec-net

  # ──────────────────────────────────────────────────────────────────────────
  # PostgreSQL 16 — Tenants, users, billing (with RLS)
  # ──────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: bomasec-postgres
    environment:
      POSTGRES_USER: bomasec
      POSTGRES_PASSWORD: bomasec_dev_secret
      POSTGRES_DB: bomasec_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - bomasec-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bomasec -d bomasec_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ──────────────────────────────────────────────────────────────────────────
  # OpenSearch 2.18 — Log storage & search analytics
  # ──────────────────────────────────────────────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.18.0
    container_name: bomasec-opensearch
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - bootstrap.memory_lock=true
      - cluster.name=bomasec-cluster
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - bomasec-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ──────────────────────────────────────────────────────────────────────────
  # OpenSearch Dashboards — Optional visual query UI
  # ──────────────────────────────────────────────────────────────────────────
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.18.0
    container_name: bomasec-opensearch-dashboards
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - bomasec-net

  # ──────────────────────────────────────────────────────────────────────────
  # FastAPI — Backend API Engine
  # ──────────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bomasec-api
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
    environment:
      # PostgreSQL
      DATABASE_URL: postgresql+asyncpg://bomasec:bomasec_dev_secret@postgres:5432/bomasec_db
      DATABASE_URL_SYNC: postgresql://bomasec:bomasec_dev_secret@postgres:5432/bomasec_db
      # Redpanda / Kafka
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      KAFKA_TOPIC: incoming-security-events
      # OpenSearch
      OPENSEARCH_HOST: opensearch
      OPENSEARCH_PORT: "9200"
      # JWT
      JWT_SECRET_KEY: bomasec-dev-jwt-secret-change-in-production
      JWT_ALGORITHM: HS256
      JWT_EXPIRY_MINUTES: "60"
      # General
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    networks:
      - bomasec-net

  # ──────────────────────────────────────────────────────────────────────────
  # Worker — Redpanda consumer → OpenSearch indexer
  # ──────────────────────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bomasec-worker
    command: python -m app.worker
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      KAFKA_TOPIC: incoming-security-events
      KAFKA_CONSUMER_GROUP: bomasec-indexer
      OPENSEARCH_HOST: opensearch
      OPENSEARCH_PORT: "9200"
      DATABASE_URL: postgresql+asyncpg://bomasec:bomasec_dev_secret@postgres:5432/bomasec_db
      ENVIRONMENT: development
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    networks:
      - bomasec-net
    restart: on-failure

  # ──────────────────────────────────────────────────────────────────────────
  # Next.js — Frontend Dashboard
  # ──────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bomasec-frontend
    command: npm run dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      # Internal Docker network URL for server-side requests
      API_INTERNAL_URL: http://api:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    networks:
      - bomasec-net

# ────────────────────────────────────────────────────────────────────────────
# Volumes
# ────────────────────────────────────────────────────────────────────────────
volumes:
  redpanda_data:
    driver: local
  postgres_data:
    driver: local
  opensearch_data:
    driver: local

# ────────────────────────────────────────────────────────────────────────────
# Networks
# ────────────────────────────────────────────────────────────────────────────
networks:
  bomasec-net:
    driver: bridge
